<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0f19"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Glow circle -->
  <circle cx="600" cy="280" r="320" fill="url(#glow)"/>
  <!-- Logo icon -->
  <g transform="translate(545, 130) scale(4.5)" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
    <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="310" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#f9fafb" text-anchor="middle" letter-spacing="-1">InsightHalo</text>
  <!-- Tagline -->
  <text x="600" y="368" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#9ca3af" text-anchor="middle">Your AI Second Brain</text>
  <!-- Divider -->
  <rect x="540" y="398" width="120" height="2" rx="1" fill="#10b981"/>
  <!-- Feature pills -->
  <rect x="160" y="434" width="180" height="40" rx="20" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="250" y="459" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#d1d5db" text-anchor="middle">Capture instantly</text>
  <rect x="360" y="434" width="180" height="40" rx="20" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="450" y="459" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#d1d5db" text-anchor="middle">AI organizes it</text>
  <rect x="560" y="434" width="180" height="40" rx="20" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="650" y="459" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#d1d5db" text-anchor="middle">Review in 2 min</text>
  <rect x="760" y="434" width="180" height="40" rx="20" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="850" y="459" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#d1d5db" text-anchor="middle">Never forget</text>
  <!-- URL -->
  <text x="600" y="560" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">insighthalo.com</text>
</svg>
