    <!-- JSON-LD: FAQPage (boosts chance of rich result in Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is InsightHalo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "InsightHalo is an AI-powered second brain app that lets you capture thoughts, voice notes, ideas and files instantly. AI automatically tags, organizes and routes everything so you never lose a valuable idea."
          }
        },
        {
          "@type": "Question",
          "name": "Is InsightHalo free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — InsightHalo has a free plan that lets you capture and organize thoughts. A Pro plan with unlimited AI features is available from $9/month."
          }
        },
        {
          "@type": "Question",
          "name": "How is InsightHalo different from Notion or Obsidian?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "InsightHalo is built for speed of capture and automatic organization. You don't build a system — the AI builds it for you. Capture in seconds, review in 2 minutes, never forget anything."
          }
        },
        {
          "@type": "Question",
          "name": "Does InsightHalo work on mobile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — InsightHalo is a progressive web app that works on any device including iPhone and Android. Voice capture, quick text capture and review all work on mobile."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — your data is stored under your account and is only visible to you. InsightHalo uses Supabase with row-level security so no other user can access your captures, projects or memory."
          }
        }
      ]
    }
    </script>
