name: Daily Day-5 Re-engagement Emails

on:
  schedule:
    # Runs daily at 09:00 UTC — slightly later than day-3 to stagger sends
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  send-day5-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Invoke send-day5-emails edge function
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/send-day5-emails" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response status: $RESPONSE"
          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "Error: unexpected status $RESPONSE"
            exit 1
          fi
