name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: https://qanoiqzanywjrcuhsmny.supabase.co
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      - name: Deploy to Hostinger via SSH/rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: 147.93.17.221
          SSH_PORT: 65002
          SSH_USER: u655326214
        run: |
          # Write private key (printf preserves newlines reliably)
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Trust host fingerprint without interactive prompt
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Verify SSH connection before rsync
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$SSH_USER@$SSH_HOST" "echo SSH_OK" || {
              echo "ERROR: SSH connection failed"
              exit 1
            }

          # Sync dist/ to public_html/
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no -o BatchMode=yes" \
            ./dist/ \
            "$SSH_USER@$SSH_HOST:/home/$SSH_USER/domains/insighthalo.com/public_html/"

          echo "Deploy complete ✓"
