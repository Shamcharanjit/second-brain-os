name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. Install dependencies
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 4. Build
      - name: Build
        run: bun run build
        env:
          # These are baked into config.ts as literals, but kept here for clarity
          VITE_SUPABASE_URL: https://qanoiqzanywjrcuhsmny.supabase.co
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      # 5. Deploy dist/ to Hostinger via FTP (retry up to 3× on failure)
      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
