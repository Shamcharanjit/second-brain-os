name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: https://qanoiqzanywjrcuhsmny.supabase.co
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Use netrc so special characters in password are handled safely
          printf 'machine %s\nlogin %s\npassword %s\n' \
            "$FTP_HOST" "$FTP_USER" "$FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc

          lftp -e "
            set ftp:passive-mode yes;
            set ftp:ssl-allow yes;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            mirror --reverse --parallel=4 ./dist/ /public_html/;
            quit
          " ftp://$FTP_HOST

          rm -f ~/.netrc
