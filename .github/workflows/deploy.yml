name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. Install dependencies
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 4. Build
      - name: Build
        run: bun run build
        env:
          # These are baked into config.ts as literals, but kept here for clarity
          VITE_SUPABASE_URL: https://qanoiqzanywjrcuhsmny.supabase.co
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      # 5. Deploy dist/ to Hostinger via lftp (more reliable than FTP action)
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_HOST;
            mirror --reverse --delete --parallel=5 --verbose \
              --exclude-glob .git* \
              --exclude-glob node_modules/ \
              ./dist/ /public_html/;
            quit
          "
