name: Weekly Sitemap Update

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Give the bot write access to push the updated sitemap
permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the bot can push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemap lastmod dates to today
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/<lastmod>.*<\/lastmod>/<lastmod>${TODAY}<\/lastmod>/g" public/sitemap.xml
          echo "Updated sitemap lastmod to $TODAY"

      - name: Commit and push updated sitemap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Explicitly set remote URL with token to bypass repo read-only default
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git add public/sitemap.xml
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No sitemap changes to commit."
          else
            git commit -m "chore: update sitemap lastmod to $(date +%Y-%m-%d)"
            git push origin HEAD:main
          fi
