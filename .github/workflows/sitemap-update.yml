name: Weekly Sitemap Update

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update sitemap lastmod dates to today
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/<lastmod>.*<\/lastmod>/<lastmod>${TODAY}<\/lastmod>/g" public/sitemap.xml
          echo "Updated sitemap lastmod to $TODAY"

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update sitemap lastmod to $(date +%Y-%m-%d)"

      - name: Push
        run: git push
