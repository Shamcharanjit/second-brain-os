name: Weekly Summary Notifications

on:
  schedule:
    # Sunday at 19:00 UTC — end-of-week recap
    - cron: "0 19 * * 0"
  workflow_dispatch: # manual trigger for testing

jobs:
  send-weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-weekly-summary Edge Function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://qanoiqzanywjrcuhsmny.supabase.co/functions/v1/send-weekly-summary" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 500 ]; then
            echo "Edge function returned error $HTTP_CODE" && exit 1
          fi
          echo "Weekly summary complete."
