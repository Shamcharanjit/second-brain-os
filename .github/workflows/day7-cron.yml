name: Daily Day-7 Retention Emails

on:
  schedule:
    # Run every day at 10:00 AM UTC (3:30 PM IST)
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger day-7 email function
        run: |
          response=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-day7-emails" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP status: $response"
          echo "Response: $(cat /tmp/resp.json)"
          if [ "$response" != "200" ]; then
            echo "Function returned non-200 status"
            exit 1
          fi
