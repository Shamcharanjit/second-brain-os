name: Sync Changelog to Supabase

on:
  push:
    branches: [main]
    paths:
      - "public/changelog.json"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build JSON payload
        # Simple bash concatenation — no Python/jq needed, no heredoc quoting issues
        run: |
          printf '{"entries":' > /tmp/payload.json
          cat public/changelog.json >> /tmp/payload.json
          printf '}' >> /tmp/payload.json
          echo "Payload size: $(wc -c < /tmp/payload.json) bytes"

      - name: Call sync-changelog edge function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL secret not set"; exit 1
          fi

          echo "POST ${SUPABASE_URL}/functions/v1/sync-changelog"

          curl -f \
            -X POST "${SUPABASE_URL}/functions/v1/sync-changelog" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json

          echo ""
          echo "Sync complete ✓"
