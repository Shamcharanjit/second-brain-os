name: Sync Changelog to Supabase

on:
  push:
    branches: [main]
    paths:
      # Only re-sync when the changelog itself changes
      - "public/changelog.json"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build payload
        run: |
          # Python heredoc must have NO leading spaces or IndentationError occurs
          python3 - << 'PYEOF'
import json, sys

with open("public/changelog.json") as f:
    entries = json.load(f)

payload = json.dumps({"entries": entries})

with open("/tmp/payload.json", "w") as f:
    f.write(payload)

print(f"Built payload: {len(entries)} entries, {len(payload)} bytes")
PYEOF

      - name: Call sync-changelog edge function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL secret not set"
            exit 1
          fi

          echo "POST ${SUPABASE_URL}/functions/v1/sync-changelog"

          curl -f -s \
            -X POST "${SUPABASE_URL}/functions/v1/sync-changelog" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            | python3 -m json.tool

          echo "Sync complete ✓"
