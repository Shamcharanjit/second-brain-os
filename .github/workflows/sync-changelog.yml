name: Sync Changelog to Supabase

on:
  push:
    branches: [main]
    paths:
      # Only re-sync when the changelog itself changes
      - "public/changelog.json"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build payload and call sync-changelog function
        run: |
          ENTRIES=$(cat public/changelog.json)
          PAYLOAD=$(jq -n --argjson entries "$ENTRIES" '{"entries": $entries}')

          RESPONSE=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/sync-changelog" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP status: $RESPONSE"
          cat /tmp/sync_response.json

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "Error: sync-changelog returned $RESPONSE"
            exit 1
          fi
